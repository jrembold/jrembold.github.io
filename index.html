		function open_random_link(chapter_links) {

			var fname_start = chapter_links[r].split("").reverse().join("").indexOf('/');
			//window.alert('You have received: ' + chapter_links[r].slice(-fname_start, -4));

				window.open(chapter_links[r]);}
			);
		}
